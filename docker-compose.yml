services:
  mock-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: mock-gateway:latest
    container_name: mock-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9003}:9003"
    environment:
      MOCK_ADMIN_TOKEN:  ${MOCK_ADMIN_TOKEN:?MOCK_ADMIN_TOKEN is required}
      MOCK_TESTER_TOKEN: ${MOCK_TESTER_TOKEN:?MOCK_TESTER_TOKEN is required}
      MOCK_VIEWER_TOKEN: ${MOCK_VIEWER_TOKEN:?MOCK_VIEWER_TOKEN is required}
      MOCK_SNAPSHOT:     /app/data/store.json
      MOCK_USERS:        /app/data/users.json
    volumes:
      - mock-data:/app/data
      - ./specs:/app/specs
      - ./config.${ENV:-local}.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9003/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mock-data:
    driver: local
